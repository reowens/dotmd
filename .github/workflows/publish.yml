name: Publish
on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          npm publish --provenance --access public
